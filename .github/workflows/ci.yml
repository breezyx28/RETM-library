name: CI

on:
  push:
    branches: master
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Coverage (warning-only stage)
        continue-on-error: true
        run: npm run test:coverage

      - name: Build library
        run: npm run build

      - name: Build playground
        run: npm --prefix playground ci && npm --prefix playground run build
